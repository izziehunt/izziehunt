<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Izzie Hunt Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-bar">
      <a class="brand" href="./index.html">izzie hunt</a>
      <nav class="menu" aria-label="Main navigation">
        <a href="./index.html#design">design</a>
        <a href="./about.html">about</a>
      </nav>
    </header>

    <main id="top">
      <section
        id="design"
        class="gallery gallery--placed"
        aria-label="Selected work"
      >
        <div
          class="gallery__left-stack"
          role="group"
          aria-label="Silver Snout Social project and DSGN grid motion"
        >
          <article class="work work-landscape featured-work gallery__mia">
            <button
              class="work-link"
              id="openProjectGallery"
              aria-label="Open Silver Snout Social project gallery"
            >
              <img
                src="./assets/mia-poster.png"
                alt="Silver Snout Social poster design"
              />
              <span class="slot-label">View Project</span>
            </button>
          </article>
          <article class="work work-landscape gallery__grid-video">
            <video
              id="motion103Video"
              class="motion-grid-video grid-video-el"
              src="./assets/final-103-po4.mp4"
              autoplay
              loop
              muted
              controls
              controlsList="nofullscreen"
              disablePictureInPicture
              playsinline
              preload="auto"
              aria-label="DSGN 103 PO4 — grid motion piece"
            ></video>
          </article>
        </div>
        <div
          class="gallery__middle-stack"
          role="group"
          aria-label="Poster series and editorial illustration"
        >
          <article class="work work-portrait gallery__r1c2 poster-project-cover">
            <button
              type="button"
              class="work-link"
              id="openPosterGallery"
              aria-label="Open poster series gallery"
            >
              <img
                src="./assets/poster-2.png"
                alt=""
              />
              <span class="slot-label poster-project-label">View posters</span>
            </button>
          </article>
          <article class="work work-portrait gallery__r2-portrait editorial-project-cover">
            <a
              class="work-link"
              href="./assets/editorial-illustration-102.pdf"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open editorial illustration PDF in a new tab"
            >
              <img
                src="./assets/editorial-illustration-102.png"
                alt="Editorial illustration from final for submission 102"
              />
              <span class="slot-label poster-project-label">View editorial</span>
            </a>
          </article>
        </div>
        <article class="work work-landscape gallery__r1c3 gallery__flicker">
          <video
            class="portfolio-screen-recording grid-video-el"
            src="./assets/screen-recording-2026-04-27.mov"
            autoplay
            loop
            muted
            controls
            controlsList="nofullscreen"
            disablePictureInPicture
            playsinline
            preload="auto"
            aria-label="Flicker recording — Light up the night"
          ></video>
        </article>
      </section>
    </main>

    <div
      class="lightbox"
      id="projectLightbox"
      aria-hidden="true"
      role="dialog"
      aria-label="Project image gallery"
    >
      <button class="lightbox-close" id="closeLightbox" aria-label="Close gallery">
        &times;
      </button>
      <button class="lightbox-nav prev" id="prevImage" aria-label="Previous image">
        &#10094;
      </button>
      <figure class="lightbox-content">
        <img id="lightboxImage" src="" alt="" />
      </figure>
      <button class="lightbox-nav next" id="nextImage" aria-label="Next image">
        &#10095;
      </button>
    </div>

    <div
      class="lightbox lightbox--posters"
      id="posterLightbox"
      aria-hidden="true"
      role="dialog"
      aria-label="Poster series gallery"
    >
      <button
        class="lightbox-close"
        id="closePosterLightbox"
        type="button"
        aria-label="Close poster gallery"
      >
        &times;
      </button>
      <button
        class="lightbox-nav prev"
        id="prevPoster"
        type="button"
        aria-label="Previous poster"
      >
        &#10094;
      </button>
      <figure class="lightbox-content">
        <img id="posterLightboxImage" src="" alt="" width="768" height="1024" />
      </figure>
      <button
        class="lightbox-nav next"
        id="nextPoster"
        type="button"
        aria-label="Next poster"
      >
        &#10095;
      </button>
    </div>

    <script>
      const projectImages = [
        {
          src: "./assets/mia-poster.png",
          alt: "Silver Snout Social poster design"
        },
        {
          src: "./assets/tote-bag-mockup.png",
          alt: "Silver Snout Social tote bag mockup"
        },
        {
          src: "./assets/employee-tshirt.png",
          alt: "Silver Snout Social t-shirt mockup"
        },
        {
          src: "./assets/bandana-merch-mockup.png",
          alt: "Silver Snout Social bandana mockup"
        }
      ];

      const openButton = document.getElementById("openProjectGallery");
      const lightbox = document.getElementById("projectLightbox");
      const lightboxImage = document.getElementById("lightboxImage");
      const closeButton = document.getElementById("closeLightbox");
      const prevButton = document.getElementById("prevImage");
      const nextButton = document.getElementById("nextImage");
      let currentIndex = 0;

      function renderImage(index) {
        const selected = projectImages[index];
        lightboxImage.src = selected.src;
        lightboxImage.alt = selected.alt;
      }

      const posterImages = [
        {
          src: "./assets/poster-2.png",
          alt: "Poster — beat the heat"
        },
        {
          src: "./assets/poster-1.png",
          alt: "Poster — gold clouds"
        },
        {
          src: "./assets/poster-3.png",
          alt: "Poster — happier eyes"
        }
      ];

      const posterLightbox = document.getElementById("posterLightbox");
      const posterLightboxImage = document.getElementById("posterLightboxImage");
      const openPosterButton = document.getElementById("openPosterGallery");
      const closePosterButton = document.getElementById("closePosterLightbox");
      const prevPosterButton = document.getElementById("prevPoster");
      const nextPosterButton = document.getElementById("nextPoster");
      let posterCurrentIndex = 0;

      function renderPoster(index) {
        const selected = posterImages[index];
        posterLightboxImage.src = selected.src;
        posterLightboxImage.alt = selected.alt;
      }

      function closePosterLightbox() {
        posterLightbox.classList.remove("is-open");
        posterLightbox.setAttribute("aria-hidden", "true");
        if (!lightbox.classList.contains("is-open")) {
          document.body.classList.remove("no-scroll");
        }
      }

      function openPosterLightbox() {
        closeLightbox();
        posterCurrentIndex = 0;
        renderPoster(posterCurrentIndex);
        posterLightbox.classList.add("is-open");
        posterLightbox.setAttribute("aria-hidden", "false");
        document.body.classList.add("no-scroll");
      }

      function showPosterPrevious() {
        posterCurrentIndex =
          (posterCurrentIndex - 1 + posterImages.length) % posterImages.length;
        renderPoster(posterCurrentIndex);
      }

      function showPosterNext() {
        posterCurrentIndex = (posterCurrentIndex + 1) % posterImages.length;
        renderPoster(posterCurrentIndex);
      }

      function openLightbox() {
        closePosterLightbox();
        renderImage(currentIndex);
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.classList.add("no-scroll");
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        if (!posterLightbox.classList.contains("is-open")) {
          document.body.classList.remove("no-scroll");
        }
      }

      function showPrevious() {
        currentIndex =
          (currentIndex - 1 + projectImages.length) % projectImages.length;
        renderImage(currentIndex);
      }

      function showNext() {
        currentIndex = (currentIndex + 1) % projectImages.length;
        renderImage(currentIndex);
      }

      openButton.addEventListener("click", openLightbox);
      closeButton.addEventListener("click", closeLightbox);
      prevButton.addEventListener("click", showPrevious);
      nextButton.addEventListener("click", showNext);

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      openPosterButton.addEventListener("click", openPosterLightbox);
      closePosterButton.addEventListener("click", closePosterLightbox);
      prevPosterButton.addEventListener("click", showPosterPrevious);
      nextPosterButton.addEventListener("click", showPosterNext);

      posterLightbox.addEventListener("click", (event) => {
        if (event.target === posterLightbox) {
          closePosterLightbox();
        }
      });

      const motion103Video = document.getElementById("motion103Video");
      if (motion103Video) {
        motion103Video.addEventListener("dblclick", (event) => {
          event.preventDefault();
        });
        const tryMotionPlay = () => {
          motion103Video.play().catch(() => {});
        };
        motion103Video.addEventListener("loadedmetadata", tryMotionPlay);
      }

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (posterLightbox.classList.contains("is-open")) {
            closePosterLightbox();
            return;
          }
          if (lightbox.classList.contains("is-open")) {
            closeLightbox();
          }
          return;
        }
        if (posterLightbox.classList.contains("is-open")) {
          if (event.key === "ArrowLeft") {
            showPosterPrevious();
          }
          if (event.key === "ArrowRight") {
            showPosterNext();
          }
          return;
        }
        if (!lightbox.classList.contains("is-open")) {
          return;
        }
        if (event.key === "ArrowLeft") {
          showPrevious();
        }
        if (event.key === "ArrowRight") {
          showNext();
        }
      });

      const portfolioVideos = document.querySelectorAll(
        ".portfolio-screen-recording"
      );
      portfolioVideos.forEach((video) => {
        video.addEventListener("dblclick", (event) => {
          event.preventDefault();
        });
        const setPlaybackDouble = () => {
          video.playbackRate = 2;
        };
        const tryPlay = () => {
          setPlaybackDouble();
          video.play().catch(() => {});
        };
        video.addEventListener("loadedmetadata", tryPlay);
        video.addEventListener("play", () => {
          portfolioVideos.forEach((other) => {
            if (other !== video) {
              other.pause();
            }
          });
          setPlaybackDouble();
        });
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          return;
        }
        document.querySelectorAll(".portfolio-screen-recording").forEach((v) => {
          v.playbackRate = 2;
          v.play().catch(() => {});
        });
        if (motion103Video) {
          motion103Video.play().catch(() => {});
        }
      });
    </script>
  </body>
</html>
